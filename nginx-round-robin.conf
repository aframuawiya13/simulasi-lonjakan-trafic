events { 
    worker_connections 1024; 
}

http {
    # Menyandikan grup server backend
    upstream my_servers {
        # Tanpa instruksi tambahan = ROUND ROBIN otomatis aktif
        server web_server_1:3000;
        server web_server_2:3000;
        server web_server_3:3000;
    }

    # Konfigurasi server proxy / gerbang utama
    server {
        listen 80;

        # Setiap request yang masuk ke '/' akan diteruskan ke grup 'my_servers'
        location / {
            proxy_pass http://my_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
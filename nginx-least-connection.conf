events { 
    worker_connections 1024; 
}

http {
    upstream my_servers {
        least_conn; # <-- Perintah wajib untuk mengaktifkan LEAST CONNECTION
        
        server web_server_1:3000;
        server web_server_2:3000;
        server web_server_3:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://my_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}